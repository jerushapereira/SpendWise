{% extends "base.html" %}
{% block title %}Expenses | SpendWise{% endblock %}
{% block page_title %}Expenses{% endblock %}
{% block content %}
<section class="form-and-list">
    <form method="post" class="panel glass-card form-panel">
        <h2>Add expense</h2>
        <div class="form-grid">
            <label>Amount<input type="number" name="amount" min="0.01" step="0.01" required></label>
            <label>Date<input type="date" name="transaction_date" value="{{ today }}" required></label>
            <label>Category<select name="category" required>{% for c in categories %}<option>{{ c }}</option>{% endfor %}</select></label>
            <label>Payment<select name="payment_method">{% for p in payment_methods %}<option>{{ p }}</option>{% endfor %}</select></label>
        </div>
        <label>Description<input type="text" name="description" maxlength="120" required placeholder="Lunch, metro card, notebook"></label>
        <label>Notes<textarea name="notes" rows="3" placeholder="Optional details"></textarea></label>
        <button class="button primary" type="submit">Add expense</button>
    </form>
    {% include "partials/transaction_table.html" with context %}
</section>
{% endblock %}
