{% extends "base.html" %}
{% block title %}Signup | SpendWise{% endblock %}
{% block content %}
<section class="auth-page">
    <a href="{{ url_for('landing') }}" class="brand centered-brand"><span class="brand-mark">S</span><span>SpendWise</span></a>
    <form method="post" class="auth-card glass-card">
        <p class="eyebrow">Start clean</p>
        <h1>Create account</h1>
        <label>Name<input type="text" name="name" required autocomplete="name"></label>
        <label>Email<input type="email" name="email" required autocomplete="email"></label>
        <label>Password<input type="password" name="password" minlength="6" required autocomplete="new-password"></label>
        <label>Confirm password<input type="password" name="confirm_password" minlength="6" required autocomplete="new-password"></label>
        <button class="button primary full" type="submit">Sign up</button>
        <p class="form-note">Already tracking? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</section>
{% endblock %}
